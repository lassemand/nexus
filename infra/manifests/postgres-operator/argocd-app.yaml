# ArgoCD Application — Zalando Postgres Operator (Helm)
#
# Installs the Zalando postgres-operator from the official Helm repository.
# The operator registers the `acid.zalan.do` CRDs (including `postgresql`)
# and manages PostgreSQL clusters in any namespace it is configured to watch.
#
# Sync wave 1: operator must be Healthy before the postgresql CRD (wave 2)
# is applied; otherwise ArgoCD cannot validate the custom resource type.
#
# Operator namespace: postgres-operator  (cluster-scoped infrastructure)
# Cluster CRD namespace: nexus           (see infra/manifests/postgres/)
#
# This file may also be applied manually as a one-time bootstrap step:
#   kubectl apply -f infra/manifests/postgres-operator/argocd-app.yaml
# After that, the root Application (infra/argocd/root-app.yaml) picks up
# infra/argocd/apps/postgres-operator.yaml and keeps it in sync via GitOps.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nexus-postgres-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default

  source:
    repoURL: https://opensource.zalando.com/postgres-operator/charts/postgres-operator
    chart: postgres-operator
    # "*" resolves to the latest published chart version at sync time.
    # Pin to a specific version (e.g. "1.14.0") once the cluster is stable.
    targetRevision: "*"
    helm:
      releaseName: postgres-operator
      # Default values are sufficient for minikube; no custom overrides needed.

  destination:
    server: https://kubernetes.default.svc
    namespace: postgres-operator

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
