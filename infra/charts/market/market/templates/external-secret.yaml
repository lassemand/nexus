apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: market-secret
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: nexus-secret-store
    kind: ClusterSecretStore

  target:
    name: market-secret
    creationPolicy: Owner

  data:
    - secretKey: POLYGON_API_KEY
      remoteRef:
        key: nexus/market
        property: POLYGON_API_KEY

    - secretKey: KAFKA_BROKERS
      remoteRef:
        key: nexus/market
        property: KAFKA_BROKERS

    - secretKey: KAFKA_TOPIC
      remoteRef:
        key: nexus/market
        property: KAFKA_TOPIC
