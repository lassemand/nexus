# Slack channel for ArgoCD sync/health notifications.
# The bot must be invited to this channel before messages will arrive.
# Use the channel name (e.g. #argocd-production) or ID (e.g. C01234ABCDE).
slackChannel: "#argocd-production"

# ArgoCD UI base URL — used to construct deep links in notification messages.
argocdUrl: "https://localhost:30443"

# Which triggers to enable. Comment out on-sync-succeeded if success messages
# turn out to be noise; add on-sync-running for in-progress visibility.
triggers:
  syncSucceeded: true
  syncFailed: true
  healthDegraded: true
