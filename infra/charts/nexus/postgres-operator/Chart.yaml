apiVersion: v2
name: postgres-operator
description: >
  Umbrella chart for the Zalando Postgres Operator.
  Wraps the upstream Helm chart as a dependency so the ApplicationSet
  can manage it from infra/charts/ without a separate Application CR.
type: application
version: 0.1.0
appVersion: "1.14.0"
dependencies:
  - name: postgres-operator
    version: "1.15.1"
    repository: https://opensource.zalando.com/postgres-operator/charts/postgres-operator
