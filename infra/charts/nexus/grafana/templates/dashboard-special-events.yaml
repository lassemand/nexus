apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-special-events
  namespace: nexus
  labels:
    grafana_dashboard: "1"
data:
  special-events.json: |
    {
      "uid": "nexus-special-events",
      "title": "Special Events",
      "tags": ["nexus"],
      "timezone": "browser",
      "time": { "from": "now-90d", "to": "now" },
      "refresh": "5m",
      "schemaVersion": 39,
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "Special Events",
          "gridPos": { "x": 0, "y": 0, "w": 24, "h": 10 },
          "datasource": { "type": "grafana-postgresql-datasource", "uid": "nexus-postgres" },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "points",
                "lineWidth": 0,
                "barAlignment": 0,
                "pointSize": 6,
                "showPoints": "always",
                "axisPlacement": "hidden"
              }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "hidden", "placement": "bottom" },
            "tooltip": { "mode": "single", "sort": "none" }
          },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "grafana-postgresql-datasource", "uid": "nexus-postgres" },
              "format": "time_series",
              "rawSql": "SELECT\n  occurred_at AS time,\n  1 AS value,\n  ticker || ' — ' || description AS metric\nFROM special_events\nWHERE $__timeFilter(occurred_at)\nORDER BY occurred_at"
            }
          ]
        },
        {
          "id": 2,
          "type": "table",
          "title": "Event Log",
          "gridPos": { "x": 0, "y": 10, "w": 24, "h": 12 },
          "datasource": { "type": "grafana-postgresql-datasource", "uid": "nexus-postgres" },
          "fieldConfig": {
            "defaults": {},
            "overrides": []
          },
          "options": {
            "sortBy": [{ "displayName": "occurred_at", "desc": true }]
          },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "grafana-postgresql-datasource", "uid": "nexus-postgres" },
              "format": "table",
              "rawSql": "SELECT occurred_at, ticker, event_type, description\nFROM special_events\nWHERE $__timeFilter(occurred_at)\nORDER BY occurred_at DESC"
            }
          ]
        },
        {
          "id": 3,
          "type": "table",
          "title": "Scanner Alerts",
          "gridPos": { "x": 0, "y": 22, "w": 24, "h": 14 },
          "datasource": { "type": "grafana-postgresql-datasource", "uid": "nexus-postgres" },
          "fieldConfig": { "defaults": {}, "overrides": [] },
          "options": { "sortBy": [{ "displayName": "score_date", "desc": true }] },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "grafana-postgresql-datasource", "uid": "nexus-postgres" },
              "format": "table",
              "rawSql": "SELECT ts.ticker, ts.score_date, ts.insider_score, ts.car_5d, ts.mean_abvol_20d,\n  (\n    SELECT string_agg(p.filer_name || ' (' ||\n      (SELECT filer_role FROM insider_filings f WHERE f.person_id = p.id AND f.ticker = ts.ticker LIMIT 1)\n      || ')', '; ')\n    FROM persons p WHERE p.id = ANY(ts.triggering_person_ids)\n  ) AS triggered_by\nFROM ticker_scores ts\nORDER BY ts.score_date DESC, ts.insider_score DESC\nLIMIT 100"
            }
          ]
        }
      ]
    }
