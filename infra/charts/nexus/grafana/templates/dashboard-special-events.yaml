apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-special-events
  namespace: nexus
  labels:
    grafana_dashboard: "1"
data:
  special-events.json: |
    {
      "uid": "nexus-special-events",
      "title": "Special Events",
      "tags": ["nexus"],
      "timezone": "browser",
      "time": { "from": "now-90d", "to": "now" },
      "refresh": "5m",
      "schemaVersion": 39,
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "Special Events",
          "gridPos": { "x": 0, "y": 0, "w": 24, "h": 10 },
          "datasource": { "type": "grafana-postgresql-datasource", "uid": "nexus-postgres" },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "points",
                "lineWidth": 0,
                "barAlignment": 0,
                "pointSize": 6,
                "showPoints": "always",
                "axisPlacement": "hidden"
              }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "hidden", "placement": "bottom" },
            "tooltip": { "mode": "single", "sort": "none" }
          },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "grafana-postgresql-datasource", "uid": "nexus-postgres" },
              "format": "time_series",
              "rawSql": "SELECT\n  occurred_at AS time,\n  1 AS value,\n  ticker || ' — ' || description AS metric\nFROM special_events\nWHERE $__timeFilter(occurred_at)\nORDER BY occurred_at"
            }
          ]
        },
        {
          "id": 2,
          "type": "table",
          "title": "Event Log",
          "gridPos": { "x": 0, "y": 10, "w": 24, "h": 12 },
          "datasource": { "type": "grafana-postgresql-datasource", "uid": "nexus-postgres" },
          "fieldConfig": {
            "defaults": {},
            "overrides": []
          },
          "options": {
            "sortBy": [{ "displayName": "occurred_at", "desc": true }]
          },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "grafana-postgresql-datasource", "uid": "nexus-postgres" },
              "format": "table",
              "rawSql": "SELECT occurred_at, ticker, event_type, description\nFROM special_events\nWHERE $__timeFilter(occurred_at)\nORDER BY occurred_at DESC"
            }
          ]
        },
        {
          "id": 3,
          "type": "table",
          "title": "Insider Filings",
          "gridPos": { "x": 0, "y": 22, "w": 24, "h": 14 },
          "datasource": { "type": "grafana-postgresql-datasource", "uid": "nexus-postgres" },
          "fieldConfig": {
            "defaults": {},
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "direction" },
                "properties": [
                  {
                    "id": "custom.displayMode",
                    "value": "color-text"
                  },
                  {
                    "id": "mappings",
                    "value": [
                      { "type": "value", "options": { "Buy":  { "color": "green", "index": 0 } } },
                      { "type": "value", "options": { "Sell": { "color": "red",   "index": 1 } } }
                    ]
                  }
                ]
              }
            ]
          },
          "options": {
            "sortBy": [{ "displayName": "transaction_date", "desc": true }]
          },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "grafana-postgresql-datasource", "uid": "nexus-postgres" },
              "format": "table",
              "rawSql": "SELECT p.filer_name, p.filer_cik, f.filer_role, f.ticker, f.transaction_date,\n  CASE WHEN f.transaction_code = 'P' THEN 'Buy' ELSE 'Sell' END AS direction,\n  f.shares, f.price_per_share, f.shares * f.price_per_share AS total_value\nFROM insider_filings f\nJOIN persons p ON p.id = f.person_id\nORDER BY f.transaction_date DESC\nLIMIT 200"
            }
          ]
        },
        {
          "id": 4,
          "type": "timeseries",
          "title": "Daily Insider Buy vs Sell Volume (90 days)",
          "gridPos": { "x": 0, "y": 36, "w": 24, "h": 10 },
          "datasource": { "type": "grafana-postgresql-datasource", "uid": "nexus-postgres" },
          "fieldConfig": { "defaults": {}, "overrides": [] },
          "options": { "legend": { "displayMode": "list", "placement": "bottom" } },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "grafana-postgresql-datasource", "uid": "nexus-postgres" },
              "format": "time_series",
              "rawSql": "SELECT transaction_date AS time,\n  CASE WHEN transaction_code = 'P' THEN 'Buy' ELSE 'Sell' END AS direction,\n  SUM(shares * price_per_share) AS total_value\nFROM insider_filings\nWHERE transaction_date >= NOW() - INTERVAL '90 days'\n  AND transaction_code IN ('P', 'S')\nGROUP BY transaction_date, transaction_code\nORDER BY transaction_date"
            }
          ]
        },
        {
          "id": 5,
          "type": "table",
          "title": "Ticker Insider Consistency",
          "gridPos": { "x": 0, "y": 46, "w": 24, "h": 14 },
          "datasource": { "type": "grafana-postgresql-datasource", "uid": "nexus-postgres" },
          "fieldConfig": {
            "defaults": {},
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "consistency_score" },
                "properties": [{ "id": "custom.displayMode", "value": "color-background" },
                  { "id": "thresholds", "value": { "mode": "absolute", "steps": [
                    { "color": "green", "value": null },
                    { "color": "yellow", "value": 0.5 },
                    { "color": "red", "value": 1.0 }
                  ]}}]
              },
              {
                "matcher": { "id": "byName", "options": "move_rate" },
                "properties": [{ "id": "custom.displayMode", "value": "color-text" },
                  { "id": "thresholds", "value": { "mode": "absolute", "steps": [
                    { "color": "green", "value": null },
                    { "color": "yellow", "value": 0.5 },
                    { "color": "red", "value": 0.8 }
                  ]}}]
              },
              {
                "matcher": { "id": "byName", "options": "insider_purchase_rate" },
                "properties": [{ "id": "custom.displayMode", "value": "color-text" },
                  { "id": "thresholds", "value": { "mode": "absolute", "steps": [
                    { "color": "green", "value": null },
                    { "color": "yellow", "value": 0.3 },
                    { "color": "red", "value": 0.6 }
                  ]}}]
              }
            ]
          },
          "options": { "sortBy": [{ "displayName": "consistency_score", "desc": true }] },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "grafana-postgresql-datasource", "uid": "nexus-postgres" },
              "format": "table",
              "rawSql": "SELECT ticker, event_count, move_rate, avg_abvol_before_event,\n  avg_suspicion, insider_purchase_rate, consistency_score\nFROM ticker_event_consistency\nORDER BY consistency_score DESC\nLIMIT 50"
            }
          ]
        },
        {
          "id": 6,
          "type": "barchart",
          "title": "Top 20 Tickers by Consistency Score",
          "gridPos": { "x": 0, "y": 60, "w": 24, "h": 12 },
          "datasource": { "type": "grafana-postgresql-datasource", "uid": "nexus-postgres" },
          "fieldConfig": { "defaults": {}, "overrides": [] },
          "options": {
            "xField": "ticker",
            "orientation": "horizontal",
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "grafana-postgresql-datasource", "uid": "nexus-postgres" },
              "format": "table",
              "rawSql": "SELECT ticker, consistency_score, move_rate, insider_purchase_rate\nFROM ticker_event_consistency\nORDER BY consistency_score DESC\nLIMIT 20"
            }
          ]
        }
      ]
    }
