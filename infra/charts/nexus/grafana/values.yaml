grafana:
  service:
    type: LoadBalancer

  persistence:
    enabled: false

  # Admin credentials injected from the grafana-secret ExternalSecret.
  envFromSecret: grafana-secret

  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          uid: nexus-prometheus
          type: prometheus
          url: http://prometheus-server.nexus.svc.cluster.local:80
          isDefault: true
          editable: false

        - name: Nexus Postgres
          uid: nexus-postgres
          type: postgres
          url: nexus-postgres.nexus.svc.cluster.local:5432
          database: backtest
          user: nexus
          secureJsonData:
            password: ${GF_DATABASE_PASSWORD}
          jsonData:
            sslmode: disable
            timescaledb: false
          editable: false

  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
