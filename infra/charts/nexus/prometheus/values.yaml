prometheus:
  # ── Alertmanager ────────────────────────────────────────────────────────────
  alertmanager:
    enabled: true

    persistence:
      enabled: false

    # Expand ${VAR} in alertmanager.yml so the webhook URL is never hardcoded.
    extraArgs:
      "config.expand-env": "true"

    # Inject the webhook URL from the ExternalSecret-managed k8s secret.
    extraEnv:
      - name: SLACK_WEBHOOK_URL
        valueFrom:
          secretKeyRef:
            name: alertmanager-slack
            key: SLACK_WEBHOOK_URL

    config:
      global:
        resolve_timeout: 5m

      route:
        group_by: ["alertname", "namespace"]
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 12h
        receiver: slack-alerts
        routes:
          # Critical alerts repeat every hour until resolved.
          - matchers:
              - severity = critical
            repeat_interval: 1h
          # Saxo token alerts are especially time-sensitive.
          - matchers:
              - alertname =~ "SaxoRefreshToken.*"
            repeat_interval: 30m

      receivers:
        - name: slack-alerts
          slack_configs:
            - api_url: "${SLACK_WEBHOOK_URL}"
              send_resolved: true
              title: >-
                [{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}]
                {{ .CommonLabels.alertname }}
              text: |-
                {{ range .Alerts }}
                *Summary:* {{ .Annotations.summary }}
                *Description:* {{ .Annotations.description }}
                *Severity:* `{{ .Labels.severity }}`  |  *Namespace:* `{{ .Labels.namespace }}`
                {{ end }}

  # ── kube-state-metrics (required for pod/job/container alerts) ────────────
  kube-state-metrics:
    enabled: true

  prometheus-node-exporter:
    enabled: false

  prometheus-pushgateway:
    enabled: false

  # ── Prometheus server ────────────────────────────────────────────────────
  server:
    retention: "15d"

    persistentVolume:
      enabled: false

    service:
      type: LoadBalancer

    # Scrape saxo_stream Prometheus metrics from its /metrics endpoint.
    extraScrapeConfigs: |
      - job_name: saxo-stream
        static_configs:
          - targets:
            - saxo-stream.chronicle.svc.cluster.local:8080
        metrics_path: /metrics

  # ── Alert rules ──────────────────────────────────────────────────────────
  serverFiles:
    alerting_rules.yml:
      groups:
        - name: nexus.saxo-token
          rules:
            # Fire when token expires in <30 min AND a rotation has occurred.
            # The -1 sentinel suppresses alerts in bootstrap/no-rotation state.
            - alert: SaxoRefreshTokenExpiringSoon
              expr: >
                saxo_refresh_token_seconds_remaining >= 0
                and saxo_refresh_token_seconds_remaining < 1800
              for: 2m
              labels:
                severity: critical
              annotations:
                summary: "Saxo refresh token expires in {{ $value | humanizeDuration }}"
                description: >-
                  The saxo_stream OAuth refresh token will expire in
                  {{ $value | humanizeDuration }}. If it expires the entire Nordic
                  data pipeline goes dark and manual re-authentication is required.
                runbook_url: "https://github.com/lassemand/nexus/blob/main/docs/guides/saxo-oauth-setup.md#recovery-if-the-refresh-token-is-invalid"

            - alert: SaxoRefreshTokenExpired
              expr: saxo_refresh_token_seconds_remaining == 0
              for: 1m
              labels:
                severity: critical
              annotations:
                summary: "Saxo refresh token has expired"
                description: >-
                  The Saxo refresh token has expired. The Nordic data pipeline is
                  dark. Immediate manual re-authentication required.
                runbook_url: "https://github.com/lassemand/nexus/blob/main/docs/guides/saxo-oauth-setup.md#recovery-if-the-refresh-token-is-invalid"

            - alert: SaxoRefreshTokenFailure
              expr: increase(saxo_refresh_token_failures_total[10m]) > 0
              for: 0m
              labels:
                severity: warning
              annotations:
                summary: "Saxo token refresh failed"
                description: >-
                  The saxo_stream service encountered a token refresh failure.
                  If this persists the refresh token chain will break within ~1 hour.
                runbook_url: "https://github.com/lassemand/nexus/blob/main/docs/guides/saxo-oauth-setup.md#recovery-if-the-refresh-token-is-invalid"

        - name: nexus.ingestion
          rules:
            # Saxo WebSocket stream pod has been not-ready for >2m.
            - alert: SaxoStreamDown
              expr: |
                absent(kube_pod_status_ready{namespace="chronicle", pod=~"saxo-stream.*", condition="true"})
                or kube_pod_status_ready{namespace="chronicle", pod=~"saxo-stream.*", condition="true"} == 0
              for: 2m
              labels:
                severity: critical
              annotations:
                summary: "Saxo stream pod is down"
                description: >-
                  The saxo-stream Deployment has had no ready pod for >2m.
                  Live Nordic bar ingestion has stopped.

            - alert: ChronicleJobFailed
              expr: kube_job_status_failed{namespace="chronicle"} > 0
              for: 0m
              labels:
                severity: warning
              annotations:
                summary: "Chronicle CronJob failed"
                description: >-
                  A CronJob in namespace chronicle has a failed execution.
                  Check pod logs: kubectl logs -n chronicle -l job-name=<name>

        - name: nexus.database
          rules:
            - alert: PostgresPrimaryDown
              expr: |
                kube_pod_status_ready{namespace="nexus", pod="nexus-postgres-0", condition="true"} == 0
              for: 1m
              labels:
                severity: critical
              annotations:
                summary: "Postgres primary is down"
                description: >-
                  nexus-postgres-0 is not ready. Signal writes and chronicle
                  DB reads will fail until it recovers.

        - name: nexus.reliability
          rules:
            - alert: PodCrashLooping
              expr: |
                rate(kube_pod_container_status_restarts_total{
                  namespace=~"chronicle|signal|nexus"
                }[15m]) * 900 > 3
              for: 5m
              labels:
                severity: warning
              annotations:
                summary: "Pod {{ $labels.pod }} is crash-looping"
                description: >-
                  Container {{ $labels.container }} in
                  {{ $labels.namespace }}/{{ $labels.pod }} has restarted
                  more than 3 times in 15 minutes.
