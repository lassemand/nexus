# ExternalSecret — pulls the Alertmanager Slack incoming webhook URL from Vault.
# The resulting secret is mounted into the Alertmanager pod as an env var and
# expanded via --config.expand-env so the config file never contains the raw URL.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: alertmanager-slack
  namespace: nexus
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: nexus-secret-store
    kind: ClusterSecretStore
  target:
    name: alertmanager-slack
    creationPolicy: Owner
  data:
    - secretKey: SLACK_WEBHOOK_URL
      remoteRef:
        key: secret/nexus/alertmanager
        property: SLACK_WEBHOOK_URL
