apiVersion: v2
name: external-secrets
description: >
  Umbrella chart for the External Secrets Operator (ESO) and the
  nexus-secret-store ClusterSecretStore that connects ESO to Vault.
  ESO is installed via Helm dependency (wave 0); the ClusterSecretStore
  is applied in wave 1 after ESO has registered its CRDs.
type: application
version: 0.1.0
appVersion: "0.10.0"
dependencies:
  - name: external-secrets
    version: "0.10.0"
    repository: https://charts.external-secrets.io
