# Values for the vault sub-chart.
# Keys are prefixed with the dependency name (vault).
vault:
  server:
    standalone:
      enabled: true
    dataStorage:
      enabled: true
      size: 1Gi
      storageClass: local-path

    # Auto-unseal via postStart lifecycle hook: runs inside the vault container
    # after it starts, reads the unseal key from the vault-unseal-key Secret.
    postStart:
      - /bin/sh
      - -c
      - |
        sleep 5
        if vault status 2>/dev/null | grep -q "Sealed.*true"; then
          vault operator unseal "$(cat /vault-unseal/key)" || true
        fi

    extraVolumes:
      - type: secret
        name: vault-unseal-key
        path: /vault-unseal

  injector:
    enabled: false

  ui:
    enabled: true
    serviceType: LoadBalancer
