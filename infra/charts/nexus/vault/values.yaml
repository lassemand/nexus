# Values for the vault sub-chart.
# Keys are prefixed with the dependency name (vault).
vault:
  server:
    standalone:
      enabled: true
    dataStorage:
      enabled: true
      size: 1Gi
      storageClass: local-path

  injector:
    enabled: false             # Vault Agent Injector is out of scope for this setup

  ui:
    enabled: true
    # Expose Vault UI at localhost:32200 on the minikube host.
    # minikube must be started with --ports=32200:32200.
    serviceType: NodePort
    serviceNodePort: 32200
