# Kafka cluster — Strimzi KRaft mode, KafkaNodePool-based.
#
# Bootstrap address (internal ClusterIP):
#   nexus-kafka-bootstrap.nexus.svc.cluster.local:9092
#
# External access from the macOS host (minikube Docker driver):
#   minikube is started with the following --ports flags so all NodePorts are
#   bound to localhost at cluster creation — no tunnel, no port-forward needed.
#
#   minikube start \
#     --ports=30080:30080   \  # ArgoCD HTTP
#     --ports=30443:30443   \  # ArgoCD HTTPS
#     --ports=30300:30300   \  # Grafana UI
#     --ports=32092:32092   \  # Kafka bootstrap
#     --ports=32093:32093   \  # Kafka broker 0
#     --ports=32200:32200      # Vault UI
#
#   KAFKA_BROKERS=localhost:32092
#
# sync-wave 1: applied after the Strimzi operator (wave 0) has registered CRDs.
apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: nexus
  namespace: nexus
  annotations:
    strimzi.io/node-pools: enabled
    strimzi.io/kraft: enabled
    argocd.argoproj.io/sync-wave: "1"
spec:
  kafka:
    version: 4.1.0
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
      # External NodePort listener — reachable from the macOS host at localhost:32092
      # because minikube is started with --ports=32092:32092,32093:32093 which
      # binds these NodePorts into the Docker container at cluster creation time.
      # No tunnel or port-forward required.
      - name: external
        port: 9093
        type: nodeport
        tls: false
        configuration:
          bootstrap:
            nodePort: 32092
          brokers:
            - broker: 0
              advertisedHost: 127.0.0.1
              nodePort: 32093
    config:
      offsets.topic.replication.factor: "1"
      transaction.state.log.replication.factor: "1"
      transaction.state.log.min.isr: "1"
      default.replication.factor: "1"
      min.insync.replicas: "1"
    readinessProbe:
      initialDelaySeconds: 15
      timeoutSeconds: 5
    livenessProbe:
      initialDelaySeconds: 15
      timeoutSeconds: 5
  entityOperator:
    topicOperator: {}
    userOperator: {}
