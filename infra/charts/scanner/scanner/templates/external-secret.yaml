apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: scanner-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: nexus-secret-store
    kind: ClusterSecretStore
  target:
    name: scanner-secret
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: nexus/scanner
        property: DATABASE_URL
