apiVersion: batch/v1
kind: CronJob
metadata:
  name: chronicle
  labels:
    app: chronicle
spec:
  schedule: {{ .Values.schedule | quote }}

  # Only one instance at a time — prevent concurrent EDGAR crawls.
  concurrencyPolicy: Forbid

  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3

  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: chronicle
        spec:
          restartPolicy: OnFailure

          containers:
            - name: chronicle
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              imagePullPolicy: IfNotPresent
              command: ["/usr/local/bin/chronicle"]

              # All runtime configuration is injected from the ESO-managed secret.
              # No env vars are hardcoded here; see templates/external-secret.yaml.
              envFrom:
                - secretRef:
                    name: chronicle-secret

              resources:
                requests:
                  memory: {{ .Values.resources.requests.memory | quote }}
                  cpu: {{ .Values.resources.requests.cpu | quote }}
                limits:
                  memory: {{ .Values.resources.limits.memory | quote }}
                  cpu: {{ .Values.resources.limits.cpu | quote }}
