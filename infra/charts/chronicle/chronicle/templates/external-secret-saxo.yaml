apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: saxo-secret
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: nexus-secret-store
    kind: ClusterSecretStore

  target:
    name: saxo-secret
    creationPolicy: Owner

  data:
    # OAuth2 application credentials (static — do not rotate without updating Vault).
    - secretKey: SAXO_CLIENT_ID
      remoteRef:
        key: nexus/saxo
        property: client_id

    - secretKey: SAXO_CLIENT_SECRET
      remoteRef:
        key: nexus/saxo
        property: client_secret

    # Bootstrap refresh token — used only on the first startup or if the
    # saxo_tokens Postgres table is empty. After first use Saxo rotates this
    # token; the service writes the new token back to the DB (see migration
    # signal/migrations/20260715000000_create_saxo_tokens.sql).
    - secretKey: SAXO_REFRESH_TOKEN
      remoteRef:
        key: nexus/saxo
        property: refresh_token

    # Bootstrap access token and expiry — used only at first startup.
    # Subsequent tokens are obtained by the service via the refresh flow.
    - secretKey: SAXO_ACCESS_TOKEN
      remoteRef:
        key: nexus/saxo
        property: access_token

    - secretKey: SAXO_TOKEN_EXPIRES_AT
      remoteRef:
        key: nexus/saxo
        property: token_expires_at

    - secretKey: SAXO_API_BASE
      remoteRef:
        key: nexus/saxo
        property: api_base

    - secretKey: SAXO_STREAMING_BASE
      remoteRef:
        key: nexus/saxo
        property: streaming_base
