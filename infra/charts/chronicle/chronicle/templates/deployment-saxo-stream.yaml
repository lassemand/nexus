apiVersion: apps/v1
kind: Deployment
metadata:
  name: saxo-stream
  labels:
    app: saxo-stream
spec:
  replicas: 1
  selector:
    matchLabels:
      app: saxo-stream
  template:
    metadata:
      labels:
        app: saxo-stream
    spec:
      # Applies signal/migrations (owns `oauth_tokens`, read/written by
      # PgTokenStore) before the app container starts. saxo-stream's own
      # embedded sqlx::migrate! call only covers chronicle/migrations
      # (e.g. `companies`, used by load_fnse_tickers) — the two migration
      # sets are intentionally kept separate; this initContainer is the
      # one that owns applying signal's set specifically for this Deployment.
      initContainers:
        - name: migrate-oauth-tokens
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: IfNotPresent
          command: ["sqlx", "migrate", "run", "--source", "/app/migrations/signal"]
          envFrom:
            - secretRef:
                name: chronicle-secret
      containers:
        - name: saxo-stream
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: IfNotPresent
          command: ["/usr/local/bin/saxo_stream"]
          ports:
            - name: health
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 2
          envFrom:
            - secretRef:
                name: chronicle-secret
            - secretRef:
                name: saxo-secret
          resources:
            requests:
              memory: {{ .Values.resources.requests.memory | quote }}
              cpu: {{ .Values.resources.requests.cpu | quote }}
            limits:
              memory: {{ .Values.resources.limits.memory | quote }}
