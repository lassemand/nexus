apiVersion: apps/v1
kind: Deployment
metadata:
  name: signal
  labels:
    app: signal
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: signal
  template:
    metadata:
      labels:
        app: signal
    spec:
      containers:
        - name: signal
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: IfNotPresent
          command: ["/usr/local/bin/signal"]

          # All runtime configuration is injected from the ESO-managed secret.
          # No env vars are hardcoded here; see templates/external-secret.yaml.
          envFrom:
            - secretRef:
                name: signal-secret

          resources:
            requests:
              memory: {{ .Values.resources.requests.memory | quote }}
              cpu: {{ .Values.resources.requests.cpu | quote }}
            limits:
              memory: {{ .Values.resources.limits.memory | quote }}
              cpu: {{ .Values.resources.limits.cpu | quote }}

          # signal has no HTTP server so a process-existence exec probe is used
          # instead of an HTTP liveness/readiness probe.
          livenessProbe:
            exec:
              command: ["pgrep", "-x", "signal"]
            initialDelaySeconds: 10
            periodSeconds: 30

          readinessProbe:
            exec:
              command: ["pgrep", "-x", "signal"]
            initialDelaySeconds: 10
            periodSeconds: 30
