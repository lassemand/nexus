apiVersion: apps/v1
kind: Deployment
metadata:
  name: signal
  labels:
    app: signal
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: signal
  template:
    metadata:
      labels:
        app: signal
    spec:
      containers:
        - name: signal
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: IfNotPresent
          command: ["/usr/local/bin/signal"]

          env:
            - name: INSIDER_MODEL_PATH
              value: /model/insider_score.onnx

          envFrom:
            - secretRef:
                name: signal-secret

          volumeMounts:
            - name: model
              mountPath: /model

          resources:
            requests:
              memory: {{ .Values.resources.requests.memory | quote }}
              cpu: {{ .Values.resources.requests.cpu | quote }}
            limits:
              memory: {{ .Values.resources.limits.memory | quote }}
              cpu: {{ .Values.resources.limits.cpu | quote }}

          livenessProbe:
            exec:
              command: ["pgrep", "-x", "signal"]
            initialDelaySeconds: 10
            periodSeconds: 30

          readinessProbe:
            exec:
              command: ["pgrep", "-x", "signal"]
            initialDelaySeconds: 10
            periodSeconds: 30

      volumes:
        - name: model
          persistentVolumeClaim:
            claimName: insider-model
