# ClusterSecretStore — connects External Secrets Operator to Vault.
#
# sync-wave 1: applied after ESO (wave 0) has registered the
# ClusterSecretStore CRD.
#
# Auth flow:
#   ESO creates a short-lived TokenRequest for the "nexus" ServiceAccount
#   in the nexus namespace, then exchanges it for a Vault token via the
#   Kubernetes auth method (role: nexus).  The resulting token has the
#   nexus-read policy granting read access to secret/data/nexus/*.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: nexus-secret-store
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  provider:
    vault:
      server: http://vault.nexus.svc.cluster.local:8200
      path: secret
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: nexus
          serviceAccountRef:
            name: nexus
            namespace: nexus
