# ApplicationSet — Git directory generator over infra/charts/<namespace>/<chart>/
#
# Directory layout: infra/charts/<namespace>/<chart>/
#   {{path[2]}}      → namespace  (e.g. nexus, signal, chronicle, market)
#   {{path.basename}} → chart name (e.g. kafka, signal, chronicle, market)
#
# Adding infra/charts/<namespace>/<chart>/ is enough for ArgoCD to deploy it —
# no manual Application CR required.
#
# Naming:    <namespace>-<chart>  (e.g. nexus-kafka, signal-signal)
# Namespace: derived from path   (e.g. nexus, signal, chronicle, market)
# Sync:      automated with prune + selfHeal
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: nexus-charts
  namespace: argocd
spec:
  # Reconcile every 3 minutes even without a webhook push.
  syncPolicy:
    applicationsSync: sync

  generators:
    - git:
        repoURL: https://github.com/lassemand/nexus.git
        revision: main
        directories:
          - path: infra/charts/*/*

  template:
    metadata:
      # e.g. "nexus-kafka" for infra/charts/nexus/kafka
      #      "signal-signal" for infra/charts/signal/signal
      name: '{{path[2]}}-{{path.basename}}'
      labels:
        app.kubernetes.io/managed-by: argocd-applicationset
        nexus/chart: '{{path.basename}}'
        nexus/namespace: '{{path[2]}}'
    spec:
      project: default

      source:
        repoURL: https://github.com/lassemand/nexus.git
        targetRevision: main
        # Points at the chart directory itself (e.g. infra/charts/nexus/kafka)
        path: '{{path}}'
        helm:
          releaseName: '{{path.basename}}'
          valueFiles:
            - values.yaml

      destination:
        server: https://kubernetes.default.svc
        # Namespace derived from directory structure: infra/charts/<namespace>/...
        namespace: '{{path[2]}}'

      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
