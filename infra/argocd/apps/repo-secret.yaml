# ArgoCD Repository Credential — ExternalSecret
#
# Pulls the GitHub repository credentials from Vault and creates an ArgoCD
# repo secret in the argocd namespace.  ArgoCD recognises secrets labelled
# argocd.argoproj.io/secret-type: repository and uses them when connecting
# to matching repoURLs.
#
# Vault path: nexus/argocd/repo
#   type     — "git"
#   url      — "https://github.com/lassemand/nexus.git"
#   username — "git"           (or a GitHub App installation username)
#   password — <github-pat>   (read-only token with contents: read scope)
#
# Bootstrap note: ESO cannot create this secret until the ClusterSecretStore
# is available AND ArgoCD can read this file (which requires repo access).
# On first cluster setup, create the secret manually (see README step 5),
# then ArgoCD/ESO will take ownership on the first successful sync.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: nexus-repo-secret
  namespace: argocd
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: nexus-secret-store
    kind: ClusterSecretStore

  target:
    name: nexus-repo-secret
    creationPolicy: Owner
    template:
      metadata:
        labels:
          # ArgoCD watches for this label to discover repository credentials.
          argocd.argoproj.io/secret-type: repository

  data:
    - secretKey: type
      remoteRef:
        key: nexus/argocd/repo
        property: type

    - secretKey: url
      remoteRef:
        key: nexus/argocd/repo
        property: url

    - secretKey: username
      remoteRef:
        key: nexus/argocd/repo
        property: username

    - secretKey: password
      remoteRef:
        key: nexus/argocd/repo
        property: password
