# Root Application — bootstraps the entire Nexus cluster.
#
# Apply this ONCE manually after ArgoCD is installed:
#   kubectl apply -f infra/argocd/root-app.yaml
#
# After that ArgoCD self-manages everything under infra/argocd/apps/.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nexus-root
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/lassemand/nexus.git
    targetRevision: main
    path: infra/argocd/apps

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
