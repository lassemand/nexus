syntax = "proto3";
package nexus;

enum Sector {
  TECHNOLOGY = 0;
  HEALTHCARE = 1;
  FINANCIALS = 2;
  CONSUMER_DISCRETIONARY = 3;
  CONSUMER_STAPLES = 4;
  ENERGY = 5;
  UTILITIES = 6;
  INDUSTRIALS = 7;
  MATERIALS = 8;
  REAL_ESTATE = 9;
  COMMUNICATION_SERVICES = 10;
}

message Company {
  string ticker = 1;
  string name = 2;
  repeated Sector sectors = 3;
}
