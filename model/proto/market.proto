syntax = "proto3";
package nexus;

// A price observation for an asset at a point in time.
message MarketEvent {
  string ticker = 1;
  double close = 2;
  double open = 3;
  double high = 4;
  double low = 5;
  uint64 volume = 6;
  string currency = 7;
  int64 timestamp_unix_secs = 8;
  // ISO 10383 Market Identifier Code (MIC) for the exchange this bar
  // originates from. Empty string means XNAS (US default).
  // Added in field 9 — do not renumber existing fields.
  string exchange_mic = 9;
}
