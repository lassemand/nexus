name: Release nexus image

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  docker:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect version change
        id: changed
        run: |
          changed=false
          max_version=""
          for crate_dir in model alpha chronicle signal insight cli mcp; do
            toml="$crate_dir/Cargo.toml"
            [ -f "$toml" ] || continue
            current=$(grep '^version = "' "$toml" | head -1 | sed 's/version = "//;s/"//')
            prev=$(git show HEAD~1:"$toml" 2>/dev/null | grep '^version = "' | head -1 | sed 's/version = "//;s/"//' || true)
            if [ -n "$prev" ] && [ "$current" != "$prev" ]; then
              changed=true
            fi
            if [ -n "$current" ] && { [ -z "$max_version" ] || \
              [ "$(printf '%s\n%s' "$current" "$max_version" | sort -V | tail -1)" = "$current" ]; }; then
              max_version="$current"
            fi
          done
          echo "changed=$changed" >> "$GITHUB_OUTPUT"
          echo "version=$max_version" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image (PR check)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push image
        if: github.event_name == 'push' && steps.changed.outputs.changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/nexus:${{ steps.changed.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/nexus:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create and push annotated git tag
        if: github.event_name == 'push' && steps.changed.outputs.changed == 'true'
        env:
          VERSION: ${{ steps.changed.outputs.version }}
        run: |
          if git ls-remote --tags origin "v$VERSION" | grep -q .; then
            echo "::error::Tag v$VERSION already exists on the remote."
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"
