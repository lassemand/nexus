name: Release nexus image

on:
  push:
    tags:
      - 'v*'

jobs:
  docker:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Stamp version into Cargo.toml
        run: sed -i 's/^version = "0\.0\.0"/version = "${{ steps.version.outputs.version }}"/' Cargo.toml

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/nexus:${{ steps.version.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/nexus:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
