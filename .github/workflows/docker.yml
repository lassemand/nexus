name: Release nexus image

on:
  push:
    branches: [main]

jobs:
  docker:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect version change
        id: changed
        run: |
          changed=false
          max_version=""
          for crate_dir in model alpha chronicle signal insight cli mcp; do
            toml="$crate_dir/Cargo.toml"
            [ -f "$toml" ] || continue
            current=$(grep '^version = "' "$toml" | head -1 | sed 's/version = "//;s/"//')
            prev=$(git show HEAD~1:"$toml" 2>/dev/null | grep '^version = "' | head -1 | sed 's/version = "//;s/"//' || true)
            if [ -n "$prev" ] && [ "$current" != "$prev" ]; then
              changed=true
            fi
            if [ -n "$current" ] && { [ -z "$max_version" ] || \
              [ "$(printf '%s\n%s' "$current" "$max_version" | sort -V | tail -1)" = "$current" ]; }; then
              max_version="$current"
            fi
          done
          echo "changed=$changed" >> "$GITHUB_OUTPUT"
          echo "version=$max_version" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        if: steps.changed.outputs.changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: steps.changed.outputs.changed == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        if: steps.changed.outputs.changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/nexus:${{ steps.changed.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/nexus:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
