name: Release nexus image

on:
  push:
    branches: [main]

jobs:
  docker:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect version change
        id: changed
        run: |
          current=$(grep '^version' Cargo.toml | head -1 | sed 's/version = "//;s/"//')
          prev=$(git show HEAD~1:Cargo.toml 2>/dev/null \
            | grep '^version' | head -1 | sed 's/version = "//;s/"//' || true)
          if [ "$current" != "$prev" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$current" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        if: steps.changed.outputs.changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: steps.changed.outputs.changed == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        if: steps.changed.outputs.changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/nexus:${{ steps.changed.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/nexus:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
