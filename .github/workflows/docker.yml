# Required repository secrets:
#   DOCKERHUB_USERNAME  – Docker Hub account name (used as image namespace)
#   DOCKERHUB_TOKEN     – Docker Hub access token with read/write permissions

name: Release nexus image

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  docker:
    name: Build and push Docker image
    runs-on: ubuntu-latest

    # Annotated git tag creation requires write access to repository contents.
    permissions:
      contents: write

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 is mandatory so that git show HEAD~1:Cargo.toml works
          # on every push; a shallow clone would fail on the first commit in the
          # shallow history.
          fetch-depth: 0

      # ── Version detection ──────────────────────────────────────────────────

      - name: Parse current version
        id: version
        run: |
          current=$(grep '^version' Cargo.toml | head -1 | sed 's/version = "//;s/"//')
          echo "current=$current" >> "$GITHUB_OUTPUT"

      - name: Parse previous version
        id: prev_version
        run: |
          prev=$(git show HEAD~1:Cargo.toml 2>/dev/null \
            | grep '^version' | head -1 | sed 's/version = "//;s/"//' \
            || echo "")
          echo "prev=$prev" >> "$GITHUB_OUTPUT"

      - name: Detect version change
        id: changed
        # Compare current vs previous; emit changed=true only when they differ.
        # All build/push/tag steps below are gated on this output so that pushes
        # to main that do not bump Cargo.toml version are no-ops for Docker.
        run: |
          if [ "${{ steps.version.outputs.current }}" != "${{ steps.prev_version.outputs.prev }}" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      # ── Docker setup ───────────────────────────────────────────────────────

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        # Only authenticate on push events; PR builds are anonymous (push: false).
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── PR build (compile check on every pull request) ─────────────────────

      - name: Build image (PR check — no push)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Release build and push (push events where version changed) ─────────

      - name: Build and push image
        if: github.event_name == 'push' && steps.changed.outputs.changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/nexus:${{ steps.version.outputs.current }}
            ${{ secrets.DOCKERHUB_USERNAME }}/nexus:latest
          cache-from: type=gha
          # mode=max caches all BuildKit layers including heavy Rust dependency
          # compilation; subsequent runs with an unchanged Cargo.lock are fast.
          cache-to: type=gha,mode=max

      # ── Git tag (push events where version changed) ────────────────────────

      - name: Create and push annotated git tag
        if: github.event_name == 'push' && steps.changed.outputs.changed == 'true'
        env:
          VERSION: ${{ steps.version.outputs.current }}
        run: |
          # Tag collision guard: abort if the tag already exists on the remote.
          # This prevents overwriting a release if a branch is force-pushed or
          # the workflow is manually re-run against the same commit.
          if git ls-remote --tags origin "v$VERSION" | grep -q .; then
            echo "::error::Tag v$VERSION already exists on the remote. Bump the version before re-releasing."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"
